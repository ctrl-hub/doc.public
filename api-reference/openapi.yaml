  parameters:
    assessment_definitions_filter:
      name: filter
      in: query
      description: |
        Filters the response data based on the value provided.

        Available filters:

        - `eq(id,xxx)`: Filter assessment definitions by ID.
        - `eq(name,xxx)`: Filter assessment definitions by name.
        - `contains(name,xxx)`: Filter assessment definitions where name contains value.
        - `eq(code,xxx)`: Filter assessment definitions by code.
        - `contains(code,xxx)`: Filter assessment definitions where code contains value.
        - `eq(organisation,xxx)`: Filter assessment definitions by organisation ID.
        - `eq(created_at,xxx)`: Filter assessment definitions by created date.

        For more information on using named filters, see [the docs](https://docs.ctrl-hub.com/api-reference/features#filtering)
      required: false
      schema:
        type: string
        default: ""
    limit:
      name: limit
      in: query
      description: Limit the number of resources returned by the API
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
        default: 100
    offset:
      name: offset
      in: query
      description: Offset the resources returned by the API
      required: false
      schema:
        type: integer
        format: int64
        minimum: 0
        default: 0
    assessment_definition_id:
      name: assessment_definition_id
      in: path
      required: true
      description: The unique identifier for the assessment definition.
      schema:
        type: string
        format: uuid
      example: c3d4e5f6-a7b8-9012-cdef-123456789012
    assessments_filter:
      name: filter
      in: query
      description: |
        Filters the response data based on the value provided.

        Available filters:

        - `eq(organisation,xxx)`: Filter assessments by organisation ID.
        - `eq(user,xxx)`: Filter assessments by user ID.
        - `eq(assessment_definition,xxx)`: Filter assessments by assessment definition ID.
        - `eq(status,xxx)`: Filter assessments by status (passed/failed).

        For more information on using named filters, see [the docs](https://docs.ctrl-hub.com/api-reference/features#filtering)
      required: false
      schema:
        type: string
        default: ""
