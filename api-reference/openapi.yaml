      type: object
      description: Attributes for a form schema
      required:
        - model
        - view
        - version
      properties:
        model:
          type: object
          description: The model schema for your data. This follows the JSON Schema specification, so the value here must be a valid JSON Schema.
          additionalProperties: true
        view:
          type: object
          required:
            - title
            - sections
          properties:
            title:
              type: string
              description: The title of the form view
            sections:
              type: array
              items:
                type: object
                required:
                  - title
                  - description
                  - rows
                properties:
                  title:
                    type: string
                    description: The title of the section
                  description:
                    type: string
                    description: The description of the section
                  order:
                    type: integer
                    minimum: 0
                  conditions:
                    type: object
                    description: Conditional logic for showing this section
                  rows:
                    type: array
                    items:
                      type: object
                      required:
                        - span
                        - columns
                        - title
                        - description
                      properties:
                        title:
                          type: string
                          description: The title of the row
                        description:
                          type: string
                          description: The description of the row
                        order:
                          type: integer
                          minimum: 0
                        span:
                          type: integer
                          minimum: 1
                          maximum: 12
                        columns:
                          type: array
                          items:
                            type: object
                            required:
                              - span
                              - blocks
                              - title
                              - description
                              - order
                            properties:
                              span:
                                type: integer
                                minimum: 1
                                maximum: 12
                              order:
                                type: integer
                                minimum: 0
                              blocks:
                                type: array
