            type: object
            required:
              - id
              - name
              - order
              - step_type
              - allowed_transitions
              - position
            properties:
              id:
                type: string
                description: A unique identifier for the step within the version
              name:
                type: string
                minLength: 1
                description: The name of the step
              order:
                type: integer
                description: The order of the step within the workflow
              step_type:
                type: string
                description: The type of the step
                enum:
                  - initial
                  - intermediate
                  - completed
                  - rejected
                  - cancelled
              allowed_transitions:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      description: The step ID to allow transitions to
                    name:
                      type: string
                      minLength: 1
                      description: The name of the transition, for example, "Approve" or "Reject"
                    description:
                      type: string
                      description: A description of the transition
                    requires_note:
                      type: boolean
                      description: Whether a note is required for this transition
              position:
                type: object
                required:
                  - x
                  - y
                properties:
                  x:
                    type: number
                    description: The x-coordinate of the step's position
                  y:
                    type: number
                    description: The y-coordinate of the step's position
