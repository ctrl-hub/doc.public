      properties:
        type:
          type: string
          enum:
            - role
            - permission
        subject:
          type: string
        scope:
          type: object
          required:
            - attributes
            - patterns
          properties:
            attributes:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  operation:
                    type: string
                    enum:
                      - "="
                      - "!="
                      - ">"
                      - "<"
                      - ">="
                      - "<="
                  value:
                    type: string
            patterns:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  matcher:
                    type: string
                    enum:
                      - prefix
                      - suffix
                      - contains
                  operation:
                    type: string
                    enum:
                      - "="
                      - "!="
                  value:
                    type: string
        reason:
          type: string
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
