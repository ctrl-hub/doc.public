          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - attributes
                  - relationships
                properties:
                  type:
                    type: string
                    const: form-schemas
                  attributes:
                    type: object
                    required:
                      - model
                      - view
                    properties:
                      model:
                        type: object
                        description: The model schema for your data. This follows the JSON Schema specification, so the value here must be a valid JSON Schema.
                        additionalProperties: true
                        examples:
                          - type: "object"
                            properties:
                              name:
                                type: "string"
                              email:
                                type: "string"
                                format: "email"
                      view:
                        type: object
                        description: The view configuration for rendering the form
                        required:
                          - title
                          - sections
                        properties:
                          title:
                            type: object
                            description: Multilingual title configuration
                            properties:
                              submit:
                                type: array
                                description: Title shown during submission
                                items:
                                  type: object
                                  properties:
                                    language:
                                      type: string
                                      description: The language code
                                      examples:
                                        - "en"
                                    value:
                                      type: string
                                      description: The title value
                                      examples:
                                        - "Submit Form"
                              view:
                                type: array
                                description: Title shown during viewing
                                items:
                                  type: object
                                  properties:
                                    language:
                                      type: string
                                      description: The language code
                                      examples:
                                        - "en"
                                    value:
                                      type: string
                                      description: The title value
                                      examples:
                                        - "Customer Information Form"
                          sections:
                            type: array
                            description: Form sections containing rows and columns
                            items:
                              type: object
                              required:
                                - title
                                - description
                                - rows
                              properties:
                                title:
                                  type: object
                                  description: Section title configuration
                                  properties:
                                    view:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          language:
                                            type: string
                                            examples:
                                              - "en"
                                          value:
                                            type: string
                                            examples:
                                              - "Personal Information"
                                description:
                                  type: object
                                  description: Section description configuration
                                  properties:
                                    view:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          language:
                                            type: string
                                            examples:
                                              - "en"
                                          value:
                                            type: string
                                            examples:
                                              - "Please provide your personal details"
                                order:
                                  type: integer
                                  minimum: 0
                                  description: Display order of the section
                                  examples:
                                    - 0
                                rows:
                                  type: array
                                  description: Rows within the section
                                  items:
                                    type: object
                                    required:
                                      - span
                                      - columns
                                      - title
                                      - description
                                    properties:
                                      title:
                                        type: object
                                        description: Row title configuration
                                      description:
                                        type: object
                                        description: Row description configuration
                                      order:
                                        type: integer
                                        minimum: 0
                                        description: Display order of the row
                                      span:
                                        type: integer
                                        minimum: 1
                                        maximum: 12
                                        description: Bootstrap grid span for the row
                                        examples:
                                          - 12
                                      columns:
                                        type: array
                                        description: Columns within the row
                                        items:
                                          type: object
                                          required:
                                            - span
                                            - blocks
                                            - title
                                            - description
                                            - order
                                          properties:
                                            span:
                                              type: integer
                                              minimum: 1
                                              maximum: 12
                                              description: Bootstrap grid span for the column
                                              examples:
                                                - 6
                                            order:
                                              type: integer
                                              minimum: 0
                                              description: Display order of the column
                                              examples:
                                                - 0
                                            title:
                                              type: object
                                              description: Column title configuration
                                            description:
                                              type: object
                                              description: Column description configuration
                                            blocks:
                                              type: array
                                              description: Form input blocks within the column
                                              items:
                                                type: object
                                                description: Form input block configuration (text, choice, boolean, etc.)
                                                additionalProperties: true
                  relationships:
                    type: object
                    required:
                      - form
                    properties:
                      form:
                        type: object
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
