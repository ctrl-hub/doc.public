components:
  securitySchemes:
    Cookie:
      description: |
        Cookie token for authentication.
      in: cookie
      name: ctrl_hub_session
      type: apiKey
    OAuth2:
      description: |
        OAuth2 token for authentication.
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: https://auth.ctrl-hub.com/oauth2/token
      type: oauth2
    Session:
      description: |
        Session token for authentication.
      in: header
      name: X-Session-Token
      type: apiKey
  schemas:
    StreetManagerSubscriptionConfirmation:
      type: object
      description: Street Manager subscription confirmation payload
      properties:
        Type:
          type: string
          description: The message type
        MessageId:
          type: string
          description: Unique identifier for the message
        Token:
          type: string
          description: Confirmation token
        TopicArn:
          type: string
          description: The ARN of the topic
        Message:
          type: string
          description: The confirmation message
        SubscribeURL:
          type: string
          description: URL to confirm the subscription
        Timestamp:
          type: string
          format: date-time
          description: When the message was sent
        SignatureVersion:
          type: string
          description: Version of the signature
        Signature:
          type: string
          description: Message signature for verification
        SigningCertURL:
          type: string
          description: URL of the signing certificate
    StreetManagerInboundRequest:
      type: object
      description: Street Manager inbound request payload
      required:
        - Type
        - MessageId
        - TopicArn
        - Message
        - Timestamp
        - SignatureVersion
        - Signature
        - SigningCertURL
        - UnsubscribeURL
        - MessageAttributes
      properties:
        Type:
          type: string
          description: The message type
        MessageId:
          type: string
          description: Unique identifier for the message
        TopicArn:
          type: string
          description: The ARN of the topic
        Message:
          type: object
          additionalProperties: true
          description: The message content
        Timestamp:
          type: string
          format: date-time
          description: When the message was sent
        SignatureVersion:
          type: string
          description: Version of the signature
        Signature:
          type: string
          description: Message signature for verification
        SigningCertURL:
          type: string
          description: URL of the signing certificate
        UnsubscribeURL:
          type: string
          description: URL to unsubscribe from the topic
        MessageAttributes:
          type: object
          additionalProperties:
            type: object
            properties:
              Type:
                type: string
              Value:
                type: string
          description: Additional message attributes
    ContactRelationship:
      type: object
      description: Represents a relationship to a contact
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the contact
        type:
          type: string
          const: contacts
    PropertyRelationship:
      type: object
      description: Represents a relationship to a property
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the property
        type:
          type: string
          const: properties
    CustomerInteractionRelationship:
      type: object
      description: Represents a relationship to a customer interaction
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the customer interaction
        type:
          type: string
          const: customer-interactions
    OperationRelationship:
      type: object
      description: Represents a relationship to an operation
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the operation
        type:
          type: string
          const: operations
    TimeBandRelationship:
      type: object
      description: Represents a relationship to a time band
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the time band
        type:
          type: string
          const: time-bands
    CustomerAccountRelationship:
      type: object
      description: Represents a relationship to a customer account
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the customer account
        type:
          type: string
          const: customer-accounts
    UserRelationship:
      type: object
      description: Represents a relationship to a user
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the user
        type:
          type: string
          const: users
    FormRelationship:
      type: object
      description: Represents a relationship to a form
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the form
        type:
          type: string
          const: forms
    AppointmentRelationship:
      type: object
      description: Represents a relationship to an appointment
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the appointment
        type:
          type: string
          const: appointments
    PermitRelationship:
      type: object
      description: Represents a relationship to a permit
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the permit
        type:
          type: string
          const: permits
    StreetRelationship:
      type: object
      description: Represents a relationship to a street
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the street
        type:
          type: string
          const: streets
    TeamRelationship:
      type: object
      description: Represents a relationship to a team
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the team
        type:
          type: string
          const: teams
    Error:
      type: object
      description: An error response
      properties:
        id:
          description: >-
            A unique identifier for this particular occurrence of the problem. If you encounter this, please provide us with the error ID and we can investigate it on our side.
          type: string
          format: uuid
          examples:
            - "05fc9c8d-73b9-4697-9337-57f7a567a48f"
        status:
          description: >-
            The status code for the error. This might not match the HTTP status code if there are more that one errors to return with different status codes.
          type: string
          examples:
            - "401"
            - "500"
        title:
          description: >-
            A human readable title for the error.
          type: string
          examples:
            - "You are not authorised to access this resource"
        detail:
          description: >-
            Where there is more detail that we can provide outside of the title, we will provide it here.
          type: string
          examples:
            - "In order to access this resource, you need the 'admin' role."
        code:
          description: >-
            A unique code for the error that may help us to diagnose the issue. Not all errors have codes, so this is usually empty.
          type: string
          examples:
            - "AUTH.001"
        source:
          description: >-
            A JSON object containing additional information about the error.
          type: object
          properties:
            pointer:
              description: >-
                A JSON Pointer to the value in the request that caused the error.
              type: string
              examples:
                - "/data/attributes/email"
            parameter:
              description: >-
                A string indicating which query parameter in the request caused the error.
              type: string
              examples:
                - "include"
      required:
        - id
        - status
        - title
    EquipmentCategory:
      type: object
      description: An equipment category
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the equipment category.
        type:
          type: string
          const: equipment-categories
        attributes:
          $ref: "#/components/schemas/EquipmentCategoryAttributes"
        meta:
          $ref: "#/components/schemas/EquipmentCategoryMeta"
        relationships:
          $ref: "#/components/schemas/EquipmentCategoryRelationships"
    DocumentMeta:
      type: object
      description: Document level meta about the resources on the server in list endpoints.
      required:
        - meta
      properties:
        meta:
          type: object
          required:
            - pagination
          properties:
            features:
              $ref: "#/components/schemas/Features"
            pagination:
              $ref: "#/components/schemas/Pagination"
    JSONAPI:
      type: object
      description: JSON API response object
      required:
        - jsonapi
      properties:
        jsonapi:
          type: object
          required:
            - version
          properties:
            version:
              type: string
              description: The version of the JSON API specification
              examples:
                - "1.0"
    EquipmentCategoryAttributes:
      type: object
      description: Attributes for an equipment category
      properties:
        name:
          type: string
          description: The equipment category name
    EquipmentCategoryMeta:
      type: object
      description: Metadata for an equipment category
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the equipment category was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the equipment category was last updated
    EquipmentCategoryRelationships:
      type: object
      description: Relationships for an equipment category
      properties:
        equipment_items:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EquipmentItemRelationship"
    EquipmentItemRelationship:
      type: object
      description: Represents a relationship to an equipment item
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for the equipment item
        type:
          type: string
          const: equipment-items
    Features:
      type: object
      description: Represents features of the API
      properties:
        include:
          type: object
          properties:
            options:
              type: array
              items:
                type: string
                examples:
                  - related.resource
    Pagination:
      type: object
      description: Represents pagination details for API responses
      required:
        - counts
        - current_page
        - offsets
        - requested
      properties:
        counts:
          type: object
          required:
            - pages
            - resources
          properties:
            pages:
              type: integer
              examples:
                - 1
            resources:
              type: integer
              examples:
                - 1
        current_page:
          type: integer
          examples:
            - 1
        offsets:
          type: object
          required:
            - next
            - previous
          properties:
            next:
              type:
                - integer
                - "null"
              examples:
                - null
            previous:
              type:
                - integer
                - "null"
              examples:
                - null
        requested:
          type: object
          required:
            - limit
            - offset
          properties:
            limit:
              type: integer
              examples:
                - 10
            offset:
              type: integer
              examples:
                - 0
    VehicleCategory:
      type: object
      description: A vehicle category
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the vehicle category.
        type:
          type: string
          const: vehicle-categories
        attributes:
          $ref: "#/components/schemas/VehicleCategoryAttributes"
        meta:
          $ref: "#/components/schemas/VehicleCategoryMeta"
        relationships:
          $ref: "#/components/schemas/VehicleCategoryRelationships"
    VehicleCategoryAttributes:
      type: object
      description: Attributes for a vehicle category
      properties:
        name:
          type: string
          description: The vehicle category name
    VehicleCategoryMeta:
      type: object
      description: Metadata for a vehicle category
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the vehicle category was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the vehicle category was last updated
    VehicleCategoryRelationships:
      type: object
      description: Relationships for a vehicle category
      properties:
        vehicles:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/VehicleRelationship"
    VehicleRelationship:
      type: object
      description: Represents a relationship to a vehicle
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the vehicle
        type:
          type: string
          const: vehicles
    Property:
      type: object
      description: A property
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the property.
        type:
          type: string
          const: properties
        attributes:
          $ref: "#/components/schemas/PropertyAttributes"
        meta:
          $ref: "#/components/schemas/PropertyMeta"
        relationships:
          $ref: "#/components/schemas/PropertyRelationships"
    PropertyIncludes:
      type: array
      description: Related resources that can be included when a property is returned
    PropertyAttributes:
      type: object
      description: Attributes for a property
      required:
        - location
        - uprn
      properties:
        address:
          type: object
          properties:
            description:
              type: string
            department:
              type: string
            organisation:
              type: string
            number:
              type: string
            name:
              type: string
            thoroughfare:
              type: string
            dependent_thoroughfare:
              type: string
            post_town:
              type: string
            postcode:
              type: string
            po_box:
              type: string
            country:
              type: string
        meters:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - mpan
                  - mprn
              number:
                type: number
        uprn:
          type: number
        location:
          type: object
          properties:
            british_national_grid:
              type:
                - object
                - "null"
            lat_long:
              type:
                - object
                - "null"
            psr:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
        psr:
          type: object
          properties:
            indicator:
              type: boolean
            priority:
              type:
                - object
                - "null"
            notes:
              type:
                - object
                - "null"
            contact:
              type:
                - object
                - "null"
    PropertyMeta:
      type: object
      description: Metadata for a property
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the property was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the property was last updated
    PropertyRelationships:
      type: object
      description: Relationships for a property
      properties:
        street:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/StreetRelationship"
    Street:
      type: object
      description: A street
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the street.
        type:
          type: string
          const: streets
        attributes:
          $ref: "#/components/schemas/StreetAttributes"
        meta:
          $ref: "#/components/schemas/StreetMeta"
        relationships:
          $ref: "#/components/schemas/StreetRelationships"
    StreetIncludes:
      type: array
      description: Related resources that can be included when a street is returned
    StreetAttributes:
      type: object
      description: Attributes for a street
      required:
        - usrn
      properties:
        name:
          type: string
          examples:
            - "Main Street"
        usrn:
          type: number
          examples:
            - 14930043
        location:
          type: object
          required:
            - british_national_grid
          properties:
            british_national_grid:
              type: array
              items:
                type: array
                items:
                  type: object
                  required:
                    - northing
                    - easting
                  properties:
                    northing:
                      type: number
                      examples:
                        - 557794
                    easting:
                      type: number
                      examples:
                        - 426415
    StreetMeta:
      type: object
      description: Metadata for a street
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the street was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the street was last updated
    StreetRelationships:
      type: object
      description: Relationships for a street
      properties:
        properties:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PropertyRelationship"
    Permission:
      type: object
      description: A permission
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          description: The permission identifier (e.g., governance.schemes.update)
        type:
          type: string
          const: permissions
        attributes:
          $ref: "#/components/schemas/PermissionAttributes"
        relationships:
          $ref: "#/components/schemas/PermissionRelationships"
    PermissionAttributes:
      type: object
      description: Attributes for a permission
      required:
        - category
        - component
        - description
        - name
        - verb
      properties:
        category:
          type: string
          description: The domain grouping this permission belongs to
          examples:
            - Governance
        component:
          type: string
          description: The component or feature this permission applies to
          examples:
            - Scheme
        description:
          type: string
          description: Human-readable explanation of the permission
          examples:
            - Update a scheme and its details
        name:
          type: string
          description: Short name of the permission
          examples:
            - Update Scheme
        verb:
          type: string
          description: Action this permission enables (e.g., Create, Read, Update, Delete)
          examples:
            - Update
    PermissionRelationships:
      type: object
      description: Relationships for a permission
      properties:
        roles:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RoleRelationship"
        groups:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserGroupRelationship"
        users:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserRelationship"
    RoleRelationship:
      type: object
      description: Represents a relationship to a role
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the role
        type:
          type: string
          const: roles
    UserGroupRelationship:
      type: object
      description: Represents a relationship to a group
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the group
        type:
          type: string
          const: groups
    Role:
      type: object
      description: A role
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          description: The role identifier (e.g., scheme.owner)
        type:
          type: string
          const: roles
        attributes:
          $ref: "#/components/schemas/RoleAttributes"
        relationships:
          $ref: "#/components/schemas/RoleRelationships"
    RoleAttributes:
      type: object
      description: Attributes for a role
      required:
        - custom
        - description
        - launch_stage
        - name
        - permissions
      properties:
        custom:
          type: boolean
          description: Indicates if the role is user-defined or system-defined
          examples:
            - false
        description:
          type: string
          description: Human-readable explanation of the role
          examples:
            - Ability to manage all aspects of projects
        launch_stage:
          type: string
          enum:
            - preview
            - beta
            - general
            - deprecated
          description: The maturity stage of the role
          examples:
            - general
        name:
          type: string
          description: Display name of the role
          examples:
            - Scheme Owner
        permissions:
          type: array
          description: List of permission IDs assigned to this role
          items:
            type: string
          examples:
            - [
                governance.schemes.create,
                governance.schemes.archive,
                governance.schemes.update,
                governance.schemes.view,
                governance.schemes.folders.update,
              ]
    RoleRelationships:
      type: object
      description: Relationships for a role
      properties:
        permissions:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PermissionRelationship"
        groups:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserGroupRelationship"
        users:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserRelationship"
    PermissionRelationship:
      type: object
      description: Represents a relationship to a permission
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the permission
        type:
          type: string
          const: permissions
    User:
      type: object
      description: A user
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the user.
          examples:
            - 123e4567-e89b-12d3-a456-426614174000
        type:
          type: string
          const: users
        attributes:
          $ref: "#/components/schemas/UserAttributes"
    ServiceAccount:
      type: object
      description: A service account
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the service account.
        type:
          type: string
          const: service-accounts
        attributes:
          $ref: "#/components/schemas/ServiceAccountAttributes"
        meta:
          $ref: "#/components/schemas/ServiceAccountMeta"
        relationships:
          $ref: "#/components/schemas/ServiceAccountRelationships"
    UserAttributes:
      type: object
      description: Attributes for a user
      properties:
        email:
          type: string
          format: email
          description: The email address of the user.
          examples:
            - john.doe@example.com
        identities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: The unique identifier for the identity.
                examples:
                  - 39ce13b8-1116-416a-ad5f-3c5edfd44f53
              platform:
                type: string
                description: The platform of the identity.
                examples:
                  - multi_tenant
              meta:
                type:
                  - object
                  - "null"
                additionalProperties: true
                description: Additional metadata for the identity.
        profile:
          type: object
          properties:
            work:
              type: object
              properties:
                occupation:
                  type: string
                  description: The occupation of the user.
                  examples:
                    - Site Manager
                cscs:
                  type: string
                  description: The CSCS card number of the user.
                  examples:
                    - CSC123456
                eusr:
                  type: string
                  description: The EUSR card number of the user.
                  examples:
                    - EUR789123
                start_date:
                  type: string
                  format: date
                  description: The start date of the user's employment.
                  examples:
                    - 2020-03-01
            personal:
              type: object
              properties:
                first_name:
                  type: string
                  description: The first name of the user.
                  examples:
                    - John
                last_name:
                  type: string
                  description: The last name of the user.
                  examples:
                    - Doe
                dob:
                  type: string
                  format: date
                  description: The date of birth of the user.
                  examples:
                    - 1985-06-15
                username:
                  type: string
                  description: The username of the user.
                  examples:
                    - johndoe
            contact:
              type: object
              properties:
                mobile:
                  type: string
                  description: The mobile number of the user.
                  examples:
                    - +44 7700 900123
                landline:
                  type: string
                  description: The landline of the user.
                  examples:
                    - +44 20 7946 0958
            address:
              type: object
              properties:
                number:
                  type: string
                  description: The house number of the user's address.
                  default: ""
                  examples:
                    - "42"
                street:
                  type: string
                  description: The street of the user's address.
