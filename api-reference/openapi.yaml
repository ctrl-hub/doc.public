          properties:
            data:
              type: object
              required:
                - type
                - id
              properties:
                type:
                  type: string
                  enum:
                    - users
                    - service-accounts
                  description: The type of actor who performed the action
                id:
                  type: string
                  format: uuid
                  description: The unique identifier of the actor
        service_account:
