                  gate:
                    type: string
                    enum:
                      - AND
                      - OR
                    description: The logical gate applied to the rules.
                    examples:
                      - AND
                  rules:
                    type: array
                    description: Conditional rules for the binding.
                    items:
                      type: object
                      required:
                        - type
                        - operator
                        - key
                        - value
                      properties:
                        type:
                          type: string
                          description: The type of rule (e.g., label).
                          examples:
                            - label
                        operator:
                          type: string
                          enum:
                            - has_value
                            - does_not_have_value
                          description: The operator for the rule.
                          examples:
                            - has_value
                        key:
                          type: string
                          description: The rule key.
                          examples:
                            - region
                        value:
                          type: string
                          description: The rule value.
                          examples:
                            - london
