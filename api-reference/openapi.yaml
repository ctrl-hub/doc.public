          description: The qualification number (e.g. "500/1514/X"). The canonical identifier for the qualification.
        title:
          type: string
          description: The full title of the qualification.
        level:
          type: string
          description: The level of the qualification (e.g. "Level 3").
        sub_level:
          type: string
          description: The sub-level of the qualification, if applicable.
        type:
          type: string
          description: The type of qualification (e.g. "QCF", "NVQ", "Award", "Certificate", "Diploma").
        total_credits:
          type:
            - integer
            - "null"
          description: The total credit value of the qualification. Null if not applicable.
        guided_learning_hours:
          type:
            - integer
            - "null"
          description: The guided learning hours for the qualification. Null if not specified.
        total_qualification_time:
          type:
            - integer
            - "null"
          description: The total qualification time in hours. Null if not specified.
        ssa:
          type: string
          description: The Sector Subject Area (e.g. "04.1 Engineering").
        operational_start_date:
          type:
            - string
            - "null"
          format: date-time
          description: The date the qualification became available. Null if not specified.
        operational_end_date:
          type:
            - string
            - "null"
          format: date-time
          description: The date the qualification ceased to be available. Null if still active.
        regulation_status:
          type: string
          description: The regulatory status of the qualification (e.g. "Available to learners", "No longer awarded", "Withdrawn").
        awarding_body_rn:
          type: string
          description: The recognition number of the owning awarding body (e.g. "RN5133").
        awarding_body_name:
          type: string
          description: The name of the owning awarding body (denormalised).
        status:
          type: string
          description: The lifecycle status of the qualification.
          enum:
            - ingested
            - published
            - archived
        provenance:
          type: string
          description: How this record entered the system.
          enum:
            - ofqual
            - manual
