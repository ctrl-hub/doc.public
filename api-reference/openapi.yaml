      type: object
      description: Object that represents a request to connect 2 organisations via a bridge
      required:
        - code
        - notes
        - status
      properties:
        code:
          type: string
          pattern: "^[A-Z0-9]{4}-[A-Z0-9]{4}$"
        notes:
          type: string
          description: Notes to describe the organisation bridge request.
          examples:
            - "This code is intended for consumption by organisation B"
        status:
          type: string
          enum:
            - initiated
            - accepted
            - confirmed
            - rejected
          default: initiated
          description: The current status of the organisation bridge request.
          examples:
            - initiated
