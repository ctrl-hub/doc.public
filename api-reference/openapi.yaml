                            description: >-
                              A JSON object containing additional information about the error.

                              When a parameter caused the error, there will be a `resource` property with the name of the resource that caused the error.
                            type: object
                      required:
                        - id
                        - status
                        - title
              example:
                errors:
                  - id: fe9d9a69-f0a7-4fdc-bb2c-176027f316c5
                    status: "500"
                    title: Internal Server Error
                    detail: An unexpected error occurred on the server.
      security:
        - Session: []
        - OAuth2: []
        - Cookie: []
