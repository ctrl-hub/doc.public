openapi: "3.1.0"
info:
  title: Ctrl Hub
  summary: An API for managing your compliance and risk posture
  description: |
    Ctrl Hub is the all-in-one platform for high-risk industries like utilities, construction, infrastructure, and renewables. We help teams manage everything from risk assessments and HAVS exposure to vehicle and equipment checks, with a guaranteed minimum of 200% ROI.
  version: 1.0.0
  termsOfService: https://www.ctrl-hub.com/terms-conditions
servers:
  - url: "https://api.ctrl-hub.com"
    description: Production
tags:
  - name: Specifications
    description: |
      Provides the API specification in JSON and YAML formats
  - name: Organisations
    description: |
      Organisations are the center point for most resources in the platform. Most other endpoints are subresources of an organisation.
  - name: Properties
    description: |
      Properties are the physical locations.
  - name: Forms
    description: |
      Forms are dynamic templates that can be used to collect data.
components:
  securitySchemes:
    Session:
      type: apiKey
      name: X-Session-Token
      in: header
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.ctrl-hub.com/oauth2/token
          scopes: {}
    Cookie:
      type: apiKey
      in: cookie
      name: ctrl_hub_session
paths:
  /spec.json:
    get:
      operationId: GetJSONSpec
      summary: Get the API spec in JSON format
      description: Returns the full API spec in JSON format.
      tags:
        - Specifications
      responses:
        "200":
          description: Get the JSON spec
          headers:
            Content-Type:
              description: >-
                The content type of the response
              schema:
                type: string
              example: application/vnd.api+json
            Content-Length:
              description: >-
                The length of the response body in bytes
              schema:
                type: integer
                format: int32
              example: 1234
            X-Request-ID:
              description: >-
                An ID that can be provided when reporting bugs to help identify the issue
              schema:
                type: string
              example: 8470f56af4cf25e22be08e72c70dbbdc
          content:
            application/json:
              schema:
                type: object
        "400":
          description: |
            There was an error with the request - this could be due to an invalid body, query parameters,
            or headers that were sent to the API.
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          description: >-
                            A unique identifier for this particular occurrence of the problem. If you encounter this, please provide us with the error ID and we can investigate it on our side.
                          type: string
                          format: uuid
                          examples: ["05fc9c8d-73b9-4697-9337-57f7a567a48f"]
                        status:
                          description: >-
                            The status code for the error. This might not match the HTTP status code if there are more that one errors to return with different status codes.
                          type: string
                          examples: ["401", "500"]
                        title:
                          description: >-
                            A human readable title for the error.
                          type: string
                          examples:
                            ["You are not authorised to access this resource"]
                        detail:
                          description: >-
                            Where there is more detail that we can provide outside of the title, we will provide it here.
                          type: string
                          examples:
                            [
                              "In order to access this resource, you need the 'admin' role.",
                            ]
                        code:
                          description: >-
                            A unique code for the error that may help us to diagnose the issue. Not all errors have codes, so this is usually empty.
                          type: string
                          examples: ["AUTH.001"]
                        source:
                          description: >-
                            A JSON object containing additional information about the error.
                          type: object
                          properties:
                            pointer:
                              description: >-
                                A JSON Pointer to the value in the request that caused the error.
                              type: string
                              examples: ["/data/attributes/email"]
                            parameter:
                              description: >-
                                A string indicating which query parameter in the request caused the error.
                              type: string
                              examples: ["include"]
                          meta:
                            description: >-
                              A JSON object containing additional information about the error.

                              When a parameter caused the error, there will be a `resource` property with the name of the resource that caused the error.
                            type: object
                      required:
                        - id
                        - status
                        - title
              example:
                errors:
                  - id: 98ca4a78-b66f-4234-9719-aaf832ee6669
                    status: "400"
                    title: A validation error was encountered
                    source:
                      parameter: include
                    meta:
                      resource: wrong_value
        "500":
          description: There was a problem handling the request on the server side
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
