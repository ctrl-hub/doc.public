    Role:
      type: object
      description: A role
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          description: The role identifier (e.g., scheme.owner)
        type:
          type: string
          const: roles
        attributes:
          $ref: "#/components/schemas/RoleAttributes"
        relationships:
          $ref: "#/components/schemas/RoleRelationships"
    RoleAttributes:
      type: object
      description: Attributes for a role
      required:
        - domain
        - role
        - name
        - description
        - available_scopes
      properties:
        domain:
          type: string
          description: The domain this role applies to
          examples:
            - projects
        role:
          type: string
          description: The role within the domain
          examples:
            - admin
        name:
          type: string
          description: Display name of the role
          examples:
            - Project admin
        description:
          type: string
          description: Human readable explanation of the role
          examples:
            - Full management of projects
        available_scopes:
          type: object
          description: Available scopes that can be applied when granting this role
          required:
            - attributes
            - patterns
          properties:
            attributes:
              type: array
              description: Attribute-based scope options
              items:
                type: object
                required:
                  - name
                  - type
                  - operations
                properties:
                  name:
                    type: string
                    description: The attribute name
                    examples:
                      - id
                      - author
                      - folder
                  type:
                    type: string
                    description: The attribute data type
                    enum:
                      - uuid
                      - string
                      - label
                      - number
                      - boolean
                  operations:
                    type: array
                    description: Supported comparison operations
                    items:
                      type: string
                      enum:
                        - "="
                        - "!="
                  resource_type:
                    type: string
                    description: The resource type that this attribute applies to, relevant when type is uuid. This can be used to fetch resources from the API in order to get the UUIDs to supply as a value
                    example:
                      - folders
                      - users
            patterns:
              type: array
              description: Pattern-based scope options
              items:
                type: object
                required:
                  - type
                  - field
                  - operations
                properties:
                  type:
                    type: string
                    description: The pattern type
                    enum:
                      - contains
                      - prefix
                      - suffix
                  field:
                    type: string
                    description: The field the pattern applies to
                    examples:
                      - name
                  operations:
                    type: array
                    description: Supported comparison operations
                    items:
                      type: string
                      enum:
                        - "="
                        - "!="
                        - "~"
    RoleRelationships:
      type: object
