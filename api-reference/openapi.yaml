    CreateQualification:
      required: true
      description: The qualification to create.
      content:
        application/vnd.api+json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - attributes
                properties:
                  type:
                    type: string
                    const: qualifications
                  attributes:
                    type: object
                    required:
                      - name
                      - qualification_type
                    properties:
                      name:
                        type: string
                        minLength: 1
                        description: The name/label of the qualification.
                        examples:
                          - UK Driving License
                      description:
                        type: string
                        description: A detailed description of the qualification.
                        examples:
                          - Issued by the DVLA
                      qualification_type:
                        type: string
                        description: The classification of the qualification.
                        enum:
                          - driving_license
                          - first_aid
                          - custom
                      renewal:
                        type: object
                        description: Renewal configuration for this qualification.
                        properties:
                          required:
                            type: boolean
                            description: Whether this qualification requires renewal.
                            default: false
                          frequency:
                            type:
                              - integer
                              - "null"
                            description: Number of days between renewals (e.g., 365 for yearly renewal). Null when renewal is not required.
                            minimum: 1
                        required:
                          - required
                      risk:
                        type: object
                        description: Risk configuration for this qualification.
                        properties:
                          carries:
                            type: boolean
                            description: Whether this qualification carries risk.
                            default: false
                          unit:
                            type:
                              - string
                              - "null"
                            const: "day"
                            description: The unit of risk threshold calculation. Null when risk is not carried.
                          thresholds:
                            type:
                              - object
                              - "null"
                            description: Risk threshold values for different risk levels measured in days remaining before expiry.
                            properties:
                              high:
                                type: number
                                description: Number of days remaining before expiry when high risk is triggered.
                              medium:
                                type: number
                                description: Number of days remaining before expiry when medium risk is triggered.
                              low:
                                type: number
                                description: Number of days remaining before expiry when low risk is triggered.
                            required:
                              - high
                              - medium
                              - low
                        required:
                          - carries
                    allOf:
                      - if:
                          properties:
                            renewal:
                              properties:
                                required:
                                  const: true
                        then:
                          properties:
                            renewal:
                              required:
                                - frequency
                      - if:
                          properties:
                            risk:
                              properties:
                                carries:
                                  const: true
                        then:
                          properties:
                            risk:
                              required:
                                - unit
                                - thresholds
