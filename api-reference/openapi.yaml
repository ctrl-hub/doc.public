    ServiceAccountLog:
      type: object
      description: A service account log entry
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the log entry.
        type:
          type: string
          const: logs
        attributes:
          $ref: "#/components/schemas/ServiceAccountLogAttributes"
        relationships:
          $ref: "#/components/schemas/ServiceAccountLogRelationships"
    ServiceAccountLogAttributes:
      type: object
      description: Attributes for a service account log entry
      properties:
        actor:
          type: object
          required:
            - id
            - type
          properties:
            id:
              type: string
              format: uuid
              description: The identifier of the actor.
            type:
              type: string
              description: The type of actor (e.g., users, service-accounts).
              examples:
                - service-accounts
        duration:
          type: integer
          description: Duration in milliseconds.
          examples:
            - 250
        request:
          type: object
          required:
            - time
            - headers
            - body
            - path
            - query
            - raw_query
            - method
            - content_length
          properties:
            time:
              type: string
              format: date-time
              description: The time the request was received.
              examples:
                - 2023-10-01T12:00:00Z
            headers:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              description: Request headers.
            body:
              type: string
              description: Raw request body as string.
              examples:
                - '{"name": "example"}'
            path:
              type: string
              description: Request path.
              examples:
                - /api/v1/organisations/123/users
            query:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              description: Parsed query parameters.
            raw_query:
              type: string
              description: Raw query string from the URL.
              examples:
                - "limit=10&offset=0"
            method:
              type: string
              description: HTTP method (GET, POST, etc.).
              examples:
                - "GET"
            content_length:
              type: integer
              description: Length of the request body in bytes.
              examples:
                - 0
        response:
          type: object
          required:
            - time
            - body
            - headers
            - status
          properties:
            time:
              type: string
              format: date-time
              description: The time the response was sent.
              examples:
                - 2023-10-01T12:00:00.250Z
            body:
              type: string
              description: Raw response body as string.
              examples:
                - '{"data": [{"id": "123", "type": "users"}]}'
            headers:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              description: Response headers.
            status:
              type: integer
              description: HTTP status code.
              examples:
                - 200
