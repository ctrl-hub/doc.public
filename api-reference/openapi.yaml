      properties:
        association:
          type: string
          enum:
            - occupier
            - landlord
          description: The association type of the contact
        salutation:
          type: string
          description: The salutation of the contact
          enum:
            - Mr
            - Mrs
            - Ms
            - Dr
            - Miss
        first_name:
          type: string
          description: The first name of the contact
        last_name:
          type: string
          description: The last name of the contact
        email:
          description: The email address of the contact
          anyOf:
            - type: string
              format: email
              minLength: 1
            - type: string
            - type: "null"
        telephone:
          type: string
          description: The telephone number of the contact
      allOf:
        - if:
            not:
              anyOf:
                - required:
                    - telephone
                - required:
                    - email
          then:
            required:
              - salutation
              - first_name
              - last_name
