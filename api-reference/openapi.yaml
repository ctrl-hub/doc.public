externalDocs:
  description: More documentation and resources
  url: https://docs.ctrl-hub.com
info:
  contact:
    email: support@ctrl-hub.com
    name: Ctrl Hub
    url: https://www.ctrl-hub.com
  description: |
    Ctrl Hub is the all-in-one platform for high-risk industries like utilities, construction, infrastructure, and renewables. We help teams manage everything from risk assessments and HAVS exposure to vehicle and equipment checks, with a guaranteed minimum of 200% ROI.
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  summary: An API for managing your compliance and risk posture
  termsOfService: https://www.ctrl-hub.com/terms-conditions
  title: Ctrl Hub
  version: 1.0.0
openapi: 3.1.0
paths:
  /spec.json:
    get:
      description: Returns the full API spec in JSON format.
      operationId: GetJSONSpec
      responses:
        "200":
          $ref: "#/components/responses/json"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      tags:
        - Specifications
      x-mint:
        metadata:
          title: Get this spec (JSON)
  /spec.yaml:
    get:
      description: Returns the full API spec in YAML format.
      operationId: GetYAMLSpec
      responses:
        "200":
          $ref: "#/components/responses/yaml"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      tags:
        - Specifications
      x-mint:
        metadata:
          title: Get this spec (YAML)
  /street-manager/activities:
    post:
      description: This is used by street manager to create a new activity.
      operationId: CreateStreetManagerActivity
      requestBody:
        content:
          text/plain:
            schema:
              oneOf:
                - $ref: "#/components/schemas/StreetManagerSubscriptionConfirmation"
                - $ref: "#/components/schemas/StreetManagerInboundRequest"
        description: The activity to handle.
        required: true
      responses:
        "200":
          description: Activity request processed successfully
          headers:
            Content-Length:
              $ref: "#/components/headers/content-length"
            Content-Type:
              $ref: "#/components/headers/content-type"
            X-Request-ID:
              $ref: "#/components/headers/x-request-id"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorised"
