    AuditEventIncludes:
      type: array
      description: Related resources that can be included when an audit event is returned
      items:
        discriminator:
          propertyName: type
          mapping:
            organisations: "#/components/schemas/Organisation"
            users: "#/components/schemas/User"
        oneOf:
          - $ref: "#/components/schemas/Organisation"
          - $ref: "#/components/schemas/User"
    AuditEventAttributes:
      type: object
      description: Attributes of an audit event.
      required:
        - time
        - operation
        - resource
        - values
        - principal
        - request_id
        - context
      properties:
        time:
          type: string
          format: date-time
          description: The date and time when the audit event occurred
        operation:
          type: string
          enum:
            - create
            - update
            - delete
          description: The type of operation that was performed
        resource:
          type: object
          required:
            - type
            - id
            - name
          properties:
            type:
              type: string
              description: The jsonapi resource type
            id:
              type: string
              description: The resource id
            name:
              type: string
              description: Human readable resource name
          description: Information about the resource that was modified
        values:
          type: array
          items:
            type: object
            required:
              - field
              - before
              - after
              - data_type
            properties:
              field:
                type: string
                description: The resource field that was changed
              before:
                description: The resource before state (preserves type)
              after:
                description: The resource after state (preserves type)
              data_type:
                type: string
                enum:
                  - string
                  - number
                  - boolean
                  - object
                  - array
                  - "null"
                description: The original data type
          description: Array of field changes that occurred during the operation
        principal:
          type: object
          required:
            - type
            - id
          properties:
            type:
              type: string
              enum:
                - users
                - service-accounts
                - jobs
              description: The type of principal
            id:
              type: string
              format: uuid
              description: The principal id
          description: Information about who performed the operation
        request_id:
          type: string
          format: uuid
          description: The unique identifier of the request that triggered this audit event
        context:
          type: object
          required:
            - client_ip
            - user_agent
          properties:
            client_ip:
              type: string
              description: The client IP address
            user_agent:
              type: string
              description: The client user agent
          description: Additional context about the request
    AuditEventMeta:
      type: object
      description: Metadata for an audit event
      required:
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the audit event was created
