          type: string
          format: date-time
          description: The date and time when the qualification was awarded
    QualificationAwardMeta:
      type: object
      description: Metadata for a qualification award
      required:
        - created_at
        - risks
      properties:
        is_valid:
          type: boolean
          description: Indicates whether there has been an assessment for this award which passed.
        is_latest:
          type: boolean
          description: Indicates whether this is the latest award for a user and qualification. If false, there is a more recent award.
        created_at:
          type: string
          format: date-time
          description: The date and time when the award was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the award was last updated
        modified_at:
          type: string
          format: date-time
          description: The date and time when the award was last modified
        expires_at:
          type: string
          format: date-time
          description: The date and time when the award expires. If the qualification does not need renewal, this will not be set.
        risks:
          type: object
          description: Risk information for this award
          required:
            - current
            - thresholds
          properties:
            current:
              type: string
              description: The current risk level
              enum:
                - none
                - low
                - medium
                - high
                - critical
            next_check:
              type: string
              format: date-time
              description: The date and time when the next risk check is scheduled based on the current risk level and thresholds
            thresholds:
              type: object
              description: Risk threshold dates
              required:
                - none
                - low
                - medium
                - high
                - critical
              properties:
                none:
                  type: string
                  format: date-time
                  description: Date when no risk period started
                low:
                  type: string
                  format: date-time
                  description: Date when low risk starts
                medium:
                  type: string
                  format: date-time
                  description: Date when medium risk starts
                high:
                  type: string
                  format: date-time
                  description: Date when high risk starts
                critical:
                  type: string
                  format: date-time
                  description: Date when critical risk starts (expiry date)
