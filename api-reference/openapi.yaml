components:
  securitySchemes:
    Cookie:
      description: |
        Cookie token for authentication.
      in: cookie
      name: ctrl_hub_session
      type: apiKey
    OAuth2:
      description: |
        OAuth2 token for authentication.
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: https://auth.ctrl-hub.com/oauth2/token
      type: oauth2
    Session:
      description: |
        Session token for authentication.
      in: header
      name: X-Session-Token
      type: apiKey
  schemas:
    StreetManagerSubscriptionConfirmation:
      type: object
      description: Street Manager subscription confirmation payload
      properties:
        Type:
          type: string
          description: The message type
        MessageId:
          type: string
          description: Unique identifier for the message
        Token:
          type: string
          description: Confirmation token
        TopicArn:
          type: string
          description: The ARN of the topic
        Message:
          type: string
          description: The confirmation message
        SubscribeURL:
          type: string
          description: URL to confirm the subscription
        Timestamp:
          type: string
          format: date-time
          description: When the message was sent
        SignatureVersion:
          type: string
          description: Version of the signature
        Signature:
          type: string
          description: Message signature for verification
        SigningCertURL:
          type: string
          description: URL of the signing certificate
    StreetManagerInboundRequest:
      type: object
      description: Street Manager inbound request payload
      required:
        - Type
        - MessageId
        - TopicArn
        - Message
        - Timestamp
        - SignatureVersion
        - Signature
        - SigningCertURL
        - UnsubscribeURL
        - MessageAttributes
      properties:
        Type:
          type: string
          description: The message type
        MessageId:
          type: string
          description: Unique identifier for the message
        TopicArn:
          type: string
          description: The ARN of the topic
        Message:
          type: object
          additionalProperties: true
          description: The message content
        Timestamp:
          type: string
          format: date-time
          description: When the message was sent
        SignatureVersion:
          type: string
          description: Version of the signature
        Signature:
          type: string
          description: Message signature for verification
        SigningCertURL:
          type: string
          description: URL of the signing certificate
        UnsubscribeURL:
          type: string
          description: URL to unsubscribe from the topic
        MessageAttributes:
          type: object
          additionalProperties:
            type: object
            properties:
              Type:
                type: string
              Value:
                type: string
          description: Additional message attributes
    FormRelationship:
      type: object
      description: Represents a relationship to a form
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the form
        type:
          type: string
          const: forms
    AppointmentRelationship:
      type: object
      description: Represents a relationship to an appointment
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the appointment
        type:
          type: string
          const: appointments
    UserRelationship:
      type: object
      description: Represents a relationship to a user
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the user
        type:
          type: string
          const: users
    PermitRelationship:
      type: object
      description: Represents a relationship to a permit
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the permit
        type:
          type: string
          const: permits
    PropertyRelationship:
      type: object
      description: Represents a relationship to a property
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the property
        type:
          type: string
          const: properties
    StreetRelationship:
      type: object
      description: Represents a relationship to a street
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the street
        type:
          type: string
          const: streets
    TeamRelationship:
      type: object
      description: Represents a relationship to a team
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the team
        type:
          type: string
          const: teams
    ContactRelationship:
      type: object
      description: Represents a relationship to a contact
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the contact
        type:
          type: string
          const: contacts
    CustomerInteractionRelationship:
      type: object
      description: Represents a relationship to a customer interaction
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the customer interaction
        type:
          type: string
          const: customer-interactions
    OperationRelationship:
      type: object
      description: Represents a relationship to an operation
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the operation
        type:
          type: string
          const: operations
    TimeBandRelationship:
      type: object
      description: Represents a relationship to a time band
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the time band
        type:
          type: string
          const: time-bands
    CustomerAccountRelationship:
      type: object
      description: Represents a relationship to a customer account
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the customer account
        type:
          type: string
          const: customer-accounts
    Error:
      type: object
      description: An error response
      properties:
        id:
          description: >-
            A unique identifier for this particular occurrence of the problem. If you encounter this, please provide us with the error ID and we can investigate it on our side.
          type: string
          format: uuid
          examples:
            - "05fc9c8d-73b9-4697-9337-57f7a567a48f"
        status:
          description: >-
            The status code for the error. This might not match the HTTP status code if there are more that one errors to return with different status codes.
          type: string
          examples:
            - "401"
            - "500"
        title:
          description: >-
            A human readable title for the error.
          type: string
          examples:
            - "You are not authorised to access this resource"
        detail:
          description: >-
            Where there is more detail that we can provide outside of the title, we will provide it here.
          type: string
          examples:
            - "In order to access this resource, you need the 'admin' role."
        code:
          description: >-
            A unique code for the error that may help us to diagnose the issue. Not all errors have codes, so this is usually empty.
          type: string
          examples:
            - "AUTH.001"
        source:
          description: >-
            A JSON object containing additional information about the error.
          type: object
          properties:
            pointer:
              description: >-
                A JSON Pointer to the value in the request that caused the error.
              type: string
              examples:
                - "/data/attributes/email"
            parameter:
              description: >-
                A string indicating which query parameter in the request caused the error.
              type: string
              examples:
                - "include"
      required:
        - id
        - status
        - title
    AddressResolution:
      type: object
      description: A single address resolution result.
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier for this resolution result.
        type:
          type: string
          const: address-resolutions
        attributes:
          type: object
          properties:
            input_address:
              type: string
              description: The original input address string.
            uprn:
              type: string
              description: The Unique Property Reference Number, if resolved.
            resolved_address:
              type: string
              description: The canonical resolved address string.
            confidence:
              type: number
              format: float
              description: Confidence score (0–100).
              minimum: 0
              maximum: 100
            confidence_zone:
              type: string
              description: Confidence zone (e.g. H, M, L).
            recommendation_code:
              type: string
              description: Recommendation code (e.g. A for accept).
            is_reliable:
              type: boolean
              description: Whether this match is reliable.
    JSONAPI:
      type: object
      description: JSON API response object
      required:
        - jsonapi
      properties:
        jsonapi:
          type: object
          required:
            - version
          properties:
            version:
              type: string
              description: The version of the JSON API specification
              examples:
                - "1.0"
    AssessmentDefinition:
      type: object
      description: An assessment definition
      required:
        - id
        - type
        - attributes
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the assessment definition.
        type:
          type: string
          const: assessment-definitions
        attributes:
          $ref: "#/components/schemas/AssessmentDefinitionAttributes"
        relationships:
          $ref: "#/components/schemas/AssessmentDefinitionRelationships"
    DocumentMeta:
      type: object
      description: Document level meta about the resources on the server in list endpoints.
      required:
        - meta
      properties:
        meta:
          type: object
          required:
            - pagination
          properties:
            features:
              $ref: "#/components/schemas/Features"
            pagination:
              $ref: "#/components/schemas/Pagination"
    AssessmentDefinitionAttributes:
      type: object
      description: Attributes for an assessment definition
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the assessment definition.
          examples:
            - CAS Assessment - Service Layer
        code:
          type: string
          nullable: true
          description: An optional code for the assessment definition.
          examples:
            - CAS 1234
        timing:
          type: string
          nullable: true
          description: When this assessment is required relative to work.
          enum:
            - prior_to_starting_work
            - first_job_assessment
          examples:
            - prior_to_starting_work
        description:
          type: string
          description: A description of the assessment definition.
    AssessmentDefinitionRelationships:
      type: object
      description: Relationships for an assessment definition
      required:
        - organisation
      properties:
        organisation:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/OrganisationRelationship"
    OrganisationRelationship:
      type: object
      description: Represents a relationship to an organisation
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the organisation
        type:
          type: string
          const: organisations
    Features:
      type: object
      description: Represents feature configurations of the API
      properties:
        include:
          type: object
          properties:
            options:
              type: array
              items:
                type: string
                examples:
                  - related.resource
    Pagination:
      type: object
      description: Represents pagination details for API responses
      required:
        - counts
        - current_page
        - offsets
        - requested
      properties:
        counts:
          type: object
          required:
            - pages
            - resources
          properties:
            pages:
              type: integer
              examples:
                - 1
            resources:
              type: integer
              examples:
                - 1
        current_page:
          type: integer
          examples:
            - 1
        offsets:
          type: object
          required:
            - next
            - previous
          properties:
            next:
              type:
                - integer
                - "null"
              examples:
                - null
            previous:
              type:
                - integer
                - "null"
              examples:
                - null
        requested:
          type: object
          required:
            - limit
            - offset
          properties:
            limit:
              type: integer
              examples:
                - 10
            offset:
              type: integer
              examples:
                - 0
    Assessment:
      type: object
      description: An assessment record
      required:
        - id
        - type
        - attributes
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the assessment.
        type:
          type: string
          const: assessments
        attributes:
          $ref: "#/components/schemas/AssessmentAttributes"
        relationships:
          $ref: "#/components/schemas/AssessmentRelationships"
    AssessmentIncludes:
      type: array
      description: Related resources that can be included when an assessment is returned
      items:
        discriminator:
          propertyName: type
          mapping:
            organisations: "#/components/schemas/Organisation"
            users: "#/components/schemas/User"
            assessment-definitions: "#/components/schemas/AssessmentDefinition"
        oneOf:
          - $ref: "#/components/schemas/Organisation"
          - $ref: "#/components/schemas/User"
          - $ref: "#/components/schemas/AssessmentDefinition"
    AssessmentAttributes:
      type: object
      description: Attributes for an assessment
      required:
        - status
      properties:
        status:
          type: string
          description: The result of the assessment.
          enum:
            - passed
            - failed
          examples:
            - passed
        assessed_at:
          type:
            - "string"
            - "null"
          format: date-time
          description: The date the assessment was conducted.
        expires_at:
          type:
            - "string"
            - "null"
          format: date-time
          description: The date the assessment expires.
    AssessmentRelationships:
      type: object
      description: Relationships for an assessment
      required:
        - organisation
        - user
        - assessment_definition
      properties:
        organisation:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/OrganisationRelationship"
        user:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserRelationship"
        assessment_definition:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AssessmentDefinitionRelationship"
        assessor:
          type: object
          required:
            - data
          properties:
            data:
              oneOf:
                - $ref: "#/components/schemas/UserRelationship"
                - type: "null"
    AssessmentDefinitionRelationship:
      type: object
      description: Represents a relationship to an assessment definition
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the assessment definition
        type:
          type: string
          const: assessment-definitions
    Organisation:
      type: object
      description: An organisation
      required:
        - id
        - type
        - attributes
        - meta
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the organisation.
        type:
          type: string
          const: organisations
        attributes:
          $ref: "#/components/schemas/OrganisationAttributes"
        meta:
          $ref: "#/components/schemas/OrganisationMeta"
        relationships:
          $ref: "#/components/schemas/OrganisationRelationships"
    User:
      type: object
      description: A user
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the user.
          examples:
            - 123e4567-e89b-12d3-a456-426614174000
        type:
          type: string
          const: users
        attributes:
          $ref: "#/components/schemas/UserAttributes"
        meta:
          $ref: "#/components/schemas/UserMeta"
        relationships:
          $ref: "#/components/schemas/UserRelationships"
    OrganisationAttributes:
      type: object
      description: Attributes for an organisation
      required:
        - name
        - slug
        - sandbox
        - settings
      properties:
        name:
          type: string
          description: The name of the organisation.
          examples:
            - Acme Construction Ltd
        slug:
          type: string
          description: The URL-friendly identifier for the organisation.
          examples:
            - acme-construction
        description:
          type: string
          description: A short description of the organisation.
          examples:
            - Leading construction company specializing in infrastructure projects
        sandbox:
          type: boolean
          description: Whether the organisation is a sandbox (i.e. a test organisation)
          examples:
            - false
        settings:
          type: object
          required:
            - nomenclature
          properties:
            nomenclature:
              type: object
              description: Custom terminology settings for the organisation.
              properties:
                governance:
                  type: object
                  properties:
                    schemes:
                      type: array
                      description: Custom terminology for schemes.
                      items:
                        type: object
                        properties:
                          singular:
                            type: string
                            examples:
                              - Project
                          plural:
                            type: string
                            examples:
                              - Projects
                          language:
                            type: string
                            examples:
                              - en
                    work_orders:
                      type: array
                      description: Custom terminology for work orders.
                      items:
                        type: object
                        properties:
                          singular:
                            type: string
                            examples:
                              - Work Order
                          plural:
                            type: string
                            examples:
                              - Work Orders
                          language:
                            type: string
                            examples:
                              - en
                    operations:
                      type: array
                      description: Custom terminology for operations.
                      items:
                        type: object
                        properties:
                          singular:
                            type: string
                            examples:
                              - Operation
                          plural:
                            type: string
                            examples:
                              - Operations
                          language:
                            type: string
                            examples:
                              - en
    OrganisationMeta:
      type: object
      description: Meta information for an organisation
      required:
        - v3
        - status
      properties:
        created_at:
          type: string
          format: date-time
          description: The creation time of the organisation.
          examples:
            - 2023-01-15T10:30:00Z
        updated_at:
          type: string
          format: date-time
          description: The last update time of the organisation.
          examples:
            - 2023-02-20T14:45:00Z
        v3:
          type: boolean
          description: Whether the organisation is using version 3 exclusively.
          examples:
            - true
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          description: The current status of the organisation.
          examples:
            - active
        features:
          type: array
          description: Available features and their limits for the organisation.
          items:
            type: object
            properties:
              name:
                type: string
                description: The name of the feature.
                examples:
                  - advanced_reporting
              enabled:
                type: boolean
                description: Whether the feature is enabled.
                examples:
                  - true
              limit:
                type: integer
                description: The usage limit for this feature (if applicable).
                examples:
                  - 1000
    OrganisationRelationships:
      type: object
      description: Relationships for an organisation
      properties:
        users:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserRelationship"
        service_accounts:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ServiceAccountRelationship"
        groups:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserGroupRelationship"
        teams:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TeamRelationship"
    ServiceAccountRelationship:
      type: object
      description: Represents a relationship to a service account
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the service account
        type:
          type: string
          const: service-accounts
    UserGroupRelationship:
      type: object
      description: Represents a relationship to a group
      required:
        - id
        - type
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the group
        type:
          type: string
          const: groups
    UserAttributes:
      type: object
      description: Attributes for a user
      properties:
        email:
          type: string
          format: email
          description: The email address of the user.
          examples:
            - john.doe@example.com
        identities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: The unique identifier for the identity.
                examples:
                  - 39ce13b8-1116-416a-ad5f-3c5edfd44f53
              platform:
                type: string
                description: The platform of the identity.
                examples:
                  - multi_tenant
              meta:
                type:
                  - object
                  - "null"
                additionalProperties: true
                description: Additional metadata for the identity.
        profile:
          type: object
          properties:
            work:
              type: object
              properties:
                occupation:
                  type: string
                  description: The occupation of the user.
                  examples:
                    - Site Manager
                cscs:
                  type: string
                  description: The CSCS card number of the user.
                  examples:
                    - CSC123456
                eusr:
                  type: string
                  description: The EUSR card number of the user.
                  examples:
                    - EUR789123
                start_date:
                  type: string
                  format: date
                  description: The start date of the user's employment.
                  examples:
                    - 2020-03-01
            personal:
              type: object
              properties:
                first_name:
                  type: string
                  description: The first name of the user.
                  examples:
                    - John
                last_name:
                  type: string
                  description: The last name of the user.
                  examples:
                    - Doe
                dob:
                  type: string
                  format: date
                  description: The date of birth of the user.
                  examples:
                    - 1985-06-15
                username:
                  type: string
                  description: The username of the user.
                  examples:
                    - johndoe
            contact:
              type: object
              properties:
                mobile:
                  type: string
                  description: The mobile number of the user.
                  examples:
                    - +44 7700 900123
                landline:
                  type: string
                  description: The landline of the user.
                  examples:
                    - +44 20 7946 0958
            address:
              type: object
              properties:
                number:
                  type: string
                  description: The house number of the user's address.
                  default: ""
                  examples:
                    - "42"
                street:
                  type: string
                  description: The street of the user's address.
                  examples:
                    - High Street
                area:
                  type: string
                  description: The area of the user's address.
                  examples:
                    - Westminster
                town:
                  type: string
                  description: The town of the user's address.
                  examples:
                    - London
                county:
                  type: string
                  description: The county of the user's address.
                  examples:
                    - Greater London
                postcode:
                  type: string
                  description: The postcode of the user's address.
                  examples:
                    - SW1A 1AA
                country_code:
                  type: string
                  description: The country code of the user's address.
                  examples:
                    - GB
                what3words:
                  type: string
                  description: The what3words location of the user's address.
                  examples:
                    - filled.count.soap
            settings:
              type: object
              properties:
                preferred_language:
                  type: string
                  description: The preferred language of the user.
                  default: en-GB
                  examples:
                    - en-GB
                timezone:
                  type: string
                  description: The timezone of the user.
                  examples:
                    - Europe/London
    UserMeta:
      type: object
      description: Metadata for a user
      properties:
        grants:
          type: array
          items:
            type: string
          description: This data is only returned on the whoami endpoint - it contains all of the user's granted permissions.
    UserRelationships:
      type: object
      description: Relationships for a user
      properties:
        organisations:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrganisationRelationship"
        teams:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TeamRelationship"
        managing_organisation:
          type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/OrganisationRelationship"
    EquipmentCategory:
      type: object
      description: An equipment category
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the equipment category.
        type:
          type: string
          const: equipment-categories
        attributes:
          $ref: "#/components/schemas/EquipmentCategoryAttributes"
        meta:
          $ref: "#/components/schemas/EquipmentCategoryMeta"
        relationships:
          $ref: "#/components/schemas/EquipmentCategoryRelationships"
    EquipmentCategoryAttributes:
      type: object
      description: Attributes for an equipment category
      properties:
        name:
          type: string
          description: The equipment category name
    EquipmentCategoryMeta:
      type: object
