  /v3/orgs:
    get:
      operationId: ListOrganisations
      summary: List all Organisations
      description: List all of the organisations you have access to.
      tags:
        - Organisations
      parameters:
        - name: limit
          in: query
          description: Limit the number of resources returned by the API
          required: false
          schema:
            type: integer
            format: int64
            default: 100
        - name: offset
          in: query
          description: Offset the resources returned by the API
          required: false
          schema:
            type: integer
            format: int64
            default: 0
        - name: filter
          in: query
          description: |
            Filters the response data based on the value provided.
            For more information on using named filters, see [the docs](https://docs.ctrl-hub.com/api-reference/features#filtering)
          required: false
          schema:
            type: string
            default: ""
        - in: query
          name: sort
          description: A comma separated list of fields to sort by.
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - name
                - -name
                - slug
                - -slug
      responses:
        "200":
          description: Get a list of organisations.
          headers:
            Content-Type:
              description: >-
                The content type of the response
              schema:
                type: string
              example: application/vnd.api+json
            Content-Length:
              description: >-
                The length of the response body in bytes
              schema:
                type: integer
                format: int32
              example: 1234
            X-Request-ID:
              description: >-
                An ID that can be provided when reporting bugs to help identify the issue
              schema:
                type: string
              example: 8470f56af4cf25e22be08e72c70dbbdc
          content:
            application/vnd.api+json:
              schema:
                allOf:
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        title: A list of organisations
                        type: array
                        items:
                          required:
                            - id
                            - name
                          properties:
                            id:
                              type: string
                              format: uuid
                            type:
                              type: string
                              enum: [organisations]
                              default: organisations
                            attributes:
                              type: object
                              required:
                                - name
                                - slug
                              properties:
                                name:
                                  type: string
                                slug:
                                  type: string
                                description:
                                  type: string
                                  description: A short description of the organisation
                                settings:
                                  type: object
                                  properties:
                                    nomenclature:
                                      type: object
                                      properties:
                                        governance:
                                          type: object
                                          properties:
                                            schemes:
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  singular:
                                                    type: string
                                                  plural:
                                                    type: string
                                                  language:
                                                    type: string
                                            work_orders:
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  singular:
                                                    type: string
                                                  plural:
                                                    type: string
                                                  language:
                                                    type: string
                                            operations:
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  singular:
                                                    type: string
                                                  plural:
                                                    type: string
                                                  language:
                                                    type: string
                            meta:
                              type: object
                              properties:
                                created_at:
                                  type: string
                                  format: date-time
                                status:
                                  type: string
                                  enum: [active, inactive]
                                  default: active
                                features:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                      enabled:
                                        type: boolean
                                      limit:
                                        type: integer
                          examples:
                            - id: c000c344-8847-47da-a091-32e75902d3b1
                              type: organisations
                              attributes:
                                name: Ctrl Hub
                                slug: ctrl-hub
                                settings:
                                  nomenclature:
                                    governance:
                                      schemes:
                                        - singular: Phase
                                          plural: Phases
                                          language: en-GB
                                      work_orders:
                                        - singular: Project
                                          plural: Projects
                                          language: en-GB
                                      operations:
                                        - singular: Task
                                          plural: Tasks
                                          language: en-GB
                              meta:
                                status: active
                                features:
                                  - name: customers
                                    enabled: true
                                    limit: 10
                  - type: object
                    properties:
                      meta:
                        type: object
                        properties:
                          features:
                            type: object
                            properties:
                              include:
                                type: object
                                properties:
                                  options:
                                    type: array
                                    items:
                                      type: string
                                      examples:
                                        - related.resource
                          pagination:
                            type: object
                            properties:
                              counts:
                                type: object
                                properties:
                                  pages:
                                    type: integer
                                    examples:
                                      - 1
                                  resources:
                                    type: integer
                                    examples:
                                      - 1
                              current_page:
                                type: integer
                                examples:
                                  - 1
                              offsets:
                                type: object
                                properties:
                                  next:
                                    type: integer
                                    examples:
                                      - null
                                  previous:
                                    type: integer
                                    examples:
                                      - null
                              requested:
                                type: object
                                properties:
                                  limit:
                                    type: integer
                                    examples:
                                      - 10
                                  offset:
                                    type: integer
                                    examples:
                                      - 0
                  - type: object
                    properties:
                      jsonapi:
                        type: object
                        properties:
                          version:
                            type: string
                            description: The version of the JSON API specification
                            examples:
                              - "1.0"
