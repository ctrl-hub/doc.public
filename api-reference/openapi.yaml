  requestBodies:
    ResolveAddresses:
      required: true
      description: The addresses to resolve.
      content:
        application/vnd.api+json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - attributes
                properties:
                  type:
                    type: string
                    const: address-resolutions
                  attributes:
                    type: object
                    required:
                      - addresses
                    properties:
                      addresses:
                        type: array
                        description: The list of free-text address strings to resolve (1–1000 addresses per request).
                        minItems: 1
                        maxItems: 1000
                        items:
                          type: string
                          minLength: 1
    CreateAssessmentDefinition:
      required: true
      description: The assessment definition to create.
      content:
        application/vnd.api+json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - attributes
                  - relationships
                properties:
                  type:
                    type: string
                    const: assessment-definitions
                  attributes:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                        minLength: 1
                        description: The name of the assessment definition.
                        examples:
                          - CAS Assessment - Service Layer
                      code:
                        type: string
                        description: An optional code for the assessment definition.
                        examples:
                          - CAS 1234
                      timing:
                        type: string
                        description: When this assessment is required relative to work.
                        enum:
                          - prior_to_starting_work
                          - first_job_assessment
                      description:
                        type: string
                        description: A description of the assessment definition.
                  relationships:
                    type: object
                    required:
                      - organisation
                    properties:
                      organisation:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
                                const: organisations
                              id:
                                type: string
                                format: uuid
                                description: The ID of the organisation.
    UpdateAssessmentDefinition:
      required: true
      description: The assessment definition to update.
      content:
        application/vnd.api+json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - id
                  - attributes
                properties:
                  id:
                    type: string
                    format: uuid
                    description: The ID of the assessment definition to update.
                  type:
                    type: string
                    const: assessment-definitions
                  attributes:
                    type: object
                    required:
                      - name
                      - timing
                      - description
                    properties:
                      name:
                        type: string
                        minLength: 1
                        description: The name of the assessment definition.
                        examples:
                          - CAS Assessment - Service Layer
                      code:
                        type: string
                        description: An optional code for the assessment definition.
                        examples:
                          - CAS 1234
                      timing:
                        type: string
                        nullable: true
                        description: When this assessment is required relative to work.
                        enum:
                          - prior_to_starting_work
                          - first_job_assessment
                      description:
                        type: string
                        nullable: true
                        description: A description of the assessment definition.
    CreateAssessment:
      required: true
      description: The assessment to create.
      content:
        application/vnd.api+json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - type
                  - attributes
                  - relationships
                properties:
                  type:
                    type: string
                    const: assessments
                  attributes:
                    type: object
                    required:
                      - status
                    properties:
                      status:
                        type: string
                        description: The result of the assessment.
                        enum:
                          - passed
                          - failed
                        examples:
                          - passed
                      assessed_at:
                        type:
                          - "string"
                          - "null"
                        format: date-time
                        description: The date the assessment was conducted.
                      expires_at:
                        type:
                          - "string"
                          - "null"
                        format: date-time
                        description: The date the assessment expires.
                  relationships:
                    type: object
                    required:
                      - organisation
                      - user
                      - assessment_definition
                    properties:
                      organisation:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
                                const: organisations
                              id:
                                type: string
                                format: uuid
                                description: The ID of the organisation.
                      user:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
                                const: users
                              id:
                                type: string
                                format: uuid
                                description: The ID of the user being assessed.
                      assessment_definition:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
                                const: assessment-definitions
                              id:
                                type: string
                                format: uuid
                                description: The ID of the assessment definition.
                      assessor:
                        type: object
                        properties:
                          data:
                            type: object
                            required:
                              - type
                              - id
                            properties:
                              type:
                                type: string
                                const: users
                              id:
                                type: string
                                format: uuid
                                description: The ID of the person who conducted the assessment.
    UpdateAssessment:
      required: true
