    name: Forms
  - description: |
      Identity and Access Management (IAM) endpoints for managing users, service accounts, and permissions.
    name: IAM
  - description: |
      Media endpoints for managing media file and images.
    name: Media
  - description: |
      Organisations are the center point for most resources in the platform. Most other endpoints are subresources of an organisation.
    name: Organisations
  - description: |
      Permits issued by street manager.
    name: Permits
  - description: |
      Projects manage your work and governance.
    name: Projects
  - description: |
      Properties are the physical locations.
    name: Properties
  - description: |
      Provides the API specification in JSON and YAML formats
    name: Specifications
  - description: |
      Streets are the physical roads.
    name: Streets
  - description: |
      Vehicles are the physical vehicles that an organisation manages.
    name: Vehicles
  - description: |
      Workforce management endpoints for tracking qualifications, certifications, and skills.
