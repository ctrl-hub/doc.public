    Permission:
      type: object
      description: A permission
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          description: The permission identifier (e.g., governance.schemes.update)
        type:
          type: string
          const: permissions
        attributes:
          $ref: "#/components/schemas/PermissionAttributes"
        relationships:
          $ref: "#/components/schemas/PermissionRelationships"
    PermissionAttributes:
      type: object
      description: Attributes for a permission
      required:
        - domain
        - object
        - action
        - name
        - description
        - available_scopes
      properties:
        domain:
          type: string
          description: The domain this permission applies to
          examples:
            - projects
        object:
          type: string
          description: The object this permission applies to
          examples:
            - schemes
        action:
          type: string
          description: The action (`create`, `view` etc)
          examples:
            - create
        name:
          type: string
          description: Short name of the permission
          examples:
            - Update Scheme
        description:
          type: string
          description: Human readable explanation of the permission
          examples:
            - Allows new schemes to be created
        available_scopes:
          type: object
          description: Available scopes that can be applied when granting this permission
          required:
            - attributes
            - patterns
          properties:
            attributes:
              type: array
              description: Attribute-based scope options
              items:
                type: object
                required:
                  - name
                  - type
                  - operations
                properties:
                  name:
                    type: string
                    description: The attribute name
                    examples:
                      - id
                      - author
                      - folder
                  type:
                    type: string
                    description: The attribute data type
                    enum:
                      - uuid
                      - string
                      - label
                      - number
                      - boolean
                  operations:
                    type: array
                    description: Supported comparison operations
                    items:
                      type: string
                      enum:
                        - "="
                        - "!="
                  resource_type:
                    type: string
                    description: The resource type that this attribute applies to, relevant when type is uuid. This can be used to fetch resources from the API in order to get the UUIDs to supply as a value
                    example:
                      - folders
                      - users
            patterns:
              type: array
              description: Pattern-based scope options
              items:
                type: object
                required:
                  - type
                  - field
                  - operations
                properties:
                  type:
                    type: string
                    description: The pattern type
                    enum:
                      - contains
                      - prefix
                      - suffix
                  field:
                    type: string
                    description: The field the pattern applies to
                    examples:
                      - name
                  operations:
                    type: array
                    description: Supported comparison operations
                    items:
                      type: string
                      enum:
                        - "="
                        - "!="
                        - "~"
