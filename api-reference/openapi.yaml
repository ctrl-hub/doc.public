      type: object
      description: Document level meta about the resources for permits
      required:
        - meta
      properties:
        meta:
          type: object
          required:
            - pagination
            - stats
          properties:
            features:
              $ref: "#/components/schemas/Features"
            pagination:
              $ref: "#/components/schemas/Pagination"
            stats:
              type: object
              required:
                - risk
              properties:
                risk:
                  type: object
                  required:
                    - none
                    - low
                    - medium
                    - high
                  properties:
                    none:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of permits with no risk
                          examples:
                            - 1
                        page:
                          type: integer
                          description: Number of permits with no risk on the current page
                          examples:
                            - 1
                    low:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of permits with low risk
                          examples:
                            - 2
                        page:
                          type: integer
                          description: Number of permits with low risk on the current page
                          examples:
                            - 2
                    medium:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of permits with medium risk
                          examples:
                            - 3
                        page:
                          type: integer
                          description: Number of permits with medium risk on the current page
                          examples:
                            - 3
                    high:
                      type: object
                      properties:
                        total:
                          type: integer
                          description: Total number of permits with high risk
                          examples:
                            - 4
                        page:
                          type: integer
                          description: Number of permits with high risk on the current page
                          examples:
                            - 4
    PermitAttributes:
      type: object
      description: Attributes for a permit
      properties:
        dates:
          type: object
          properties:
            start:
              type: string
              format: date-time
              description: Permit start date
              examples:
                - "2025-09-01T09:00:00Z"
            end:
              type: string
              format: date-time
              description: Permit end date
              examples:
                - "2025-09-30T17:00:00Z"
        risk:
          type: object
          properties:
            remaining:
              type: object
              properties:
                days:
                  type: number
                  format: float
                  description: Remaining days
                  examples:
                    - 5.0
                percent:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 100
                  description: Remaining time as percentage (0-100)
                  examples:
                    - 50.0
            status:
              type: string
              description: Risk status
              enum:
                - "low"
                - "medium"
                - "high"
              examples:
                - low
    PermitMeta:
      type: object
      description: Metadata for a permit
      required:
        - created_at
        - updated_at
        - modified_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the permit was created
          examples:
            - "2025-10-21T15:03:18.069Z"
        updated_at:
          type: string
          format: date-time
          description: The date and time when the permit was last updated
          examples:
            - "2025-10-21T15:03:18.069Z"
        modified_at:
          type: string
          format: date-time
          description: The date and time when the permit was last modified
          examples:
            - "2025-10-21T15:03:18.069Z"
        source_permit:
          type: object
          description: The underlying source permit that this permit is based on, for example the Street Manager one
          properties:
            usrn:
              type: number
              description: The USRN of the source permit
              examples:
                - 1234567890
            reference:
              type: string
              description: The reference ID of the source permit
              examples:
                - SM-12345
            status:
              type: string
              description: The permit status associated of the source permit
              examples:
                - refused
            work_status:
              type: string
              description: The work status associated of the source permit
              examples:
                - in_progress
        governance:
          type: object
          properties:
            complete:
              type: boolean
              description: Whether the permit has been completed
              examples:
                - true
