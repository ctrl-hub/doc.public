    Qualification:
      type: object
      description: A qualification
      required:
        - id
        - type
        - attributes
        - meta
        - relationships
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the qualification.
        type:
          type: string
          const: qualifications
        attributes:
          $ref: "#/components/schemas/QualificationAttributes"
        meta:
          $ref: "#/components/schemas/QualificationMeta"
        relationships:
          $ref: "#/components/schemas/QualificationRelationships"
    QualificationAttributes:
      type: object
      description: Attributes for a qualification
      required:
        - name
        - qualification_type
      properties:
        name:
          type: string
          description: The name/label of the qualification.
        description:
          type: string
          description: A detailed description of the qualification.
        qualification_type:
          type: string
          description: The classification of the qualification.
          enum:
            - driving_license
            - first_aid
            - custom
        renewal:
          type: object
          description: Renewal configuration for this qualification.
          properties:
            required:
              type: boolean
              description: Whether this qualification requires renewal.
              default: false
            frequency:
              type:
                - integer
                - "null"
              description: Number of days between renewals (e.g., 365 for yearly renewal). Null when renewal is not required.
              minimum: 1
          required:
            - required
        risk:
          type: object
          description: Risk configuration for this qualification.
          properties:
            carries:
              type: boolean
              description: Whether this qualification carries risk.
              default: false
            unit:
              type:
                - string
                - "null"
              const: "day"
              description: The unit of risk threshold calculation. Null when risk is not carried.
            thresholds:
              type:
                - object
                - "null"
              description: Risk threshold values for different risk levels measured in days remaining before expiry.
              properties:
                high:
                  type: number
                  description: Number of days remaining before expiry when high risk is triggered.
                medium:
                  type: number
                  description: Number of days remaining before expiry when medium risk is triggered.
                low:
                  type: number
                  description: Number of days remaining before expiry when low risk is triggered.
              required:
                - high
                - medium
                - low
          required:
            - carries
      allOf:
        - if:
            properties:
              renewal:
                properties:
                  required:
                    const: true
          then:
            properties:
              renewal:
                required:
                  - frequency
        - if:
            properties:
              risk:
                properties:
                  carries:
                    const: true
          then:
            properties:
              risk:
                required:
                  - unit
                  - thresholds
    QualificationMeta:
      type: object
      description: Metadata for a qualification
      required:
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
          description: The date and time when the qualification was created
        updated_at:
          type: string
          format: date-time
          description: The date and time when the qualification was last updated
